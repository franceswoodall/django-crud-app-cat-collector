{% extends 'base.html' %} 
{% load static %} 
{% block head %}
<link rel="stylesheet" href="{% static 'css/form.css' %}" />
{% endblock %} 
{% block content %}

<div class="page-header">
  <!-- Check if a cat object exists to determine if we're editing -->
  {% if cat %}
    <h1>Edit {{ cat.name }}</h1>
  {% else %}
    <h1>Add a Cat</h1>
  {% endif %}
  <img src="{% static 'images/nerd-cat.svg' %}" alt="A cat using a computer" />
</div>
  

<form action="" method="post" class="form-container">
  {% csrf_token %} <!-- this is a security measure this token, pronounced csurf. It assigns a token that lives in your browser inside your local storage session. 
  When you submit a form it expects this token you have been assigned. A very helpful inbuilt Django security measure!  -->
  <table>
    {{ form.as_table }}
  </table>
  <button type="submit" class="btn submit">Submit!</button>
</form>

{% endblock %}
